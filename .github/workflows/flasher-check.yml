name: flasher-check

# Root-cause guard for the web flasher: a PR that adds/edits a flasher manifest
# must point its FIRST (smallest-offset) part at a real ESP image — first byte
# 0xE9. This is what stops a "brick on flash" bin (0xff/erased at offset 0)
# from ever reaching the live Pages site again. Also fails on missing parts.

on:
  pull_request:
    paths: ["docs/**"]
  workflow_dispatch: {}

jobs:
  validate-flasher-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every manifest's offset-0 part must be a valid ESP image (0xE9)
        run: |
          fail=0
          shopt -s nullglob
          for m in docs/manifest-*.json; do
            # for each build, take the part with the smallest offset
            mapfile -t parts < <(python3 - "$m" <<'PY'
import json,sys
d=json.load(open(sys.argv[1]))
for b in d.get("builds",[]):
    ps=b.get("parts",[])
    if not ps: continue
    p=sorted(ps,key=lambda x:x.get("offset",0))[0]
    print(p.get("path",""), p.get("offset",0))
PY
)
            for line in "${parts[@]}"; do
              bin="${line% *}"; off="${line##* }"
              f="docs/$bin"
              if [ ! -f "$f" ]; then echo "::error file=$m::references missing part '$bin'"; fail=1; continue; fi
              magic=$(head -c1 "$f" | xxd -p)
              if [ "$magic" != "e9" ]; then
                echo "::error file=$m::offset-$off part '$bin' starts 0x$magic — must be 0xE9 (a 0xff/non-E9 image at the base offset bricks the board on flash)"
                fail=1
              else
                echo "✓ $m → $bin (0xE9)"
              fi
            done
          done
          if [ "$fail" -ne 0 ]; then echo "❌ one or more flasher manifests would ship a bad image"; exit 1; fi
          echo "✅ all flasher manifests point at valid 0xE9 images"

      - name: Pack board tags must match manifest chip families
        run: |
          python3 - <<'PY'
import json
import pathlib
import sys

root = pathlib.Path("docs")
fail = False
for pack_path in sorted((root / "packs").glob("*.json")):
    pack = json.loads(pack_path.read_text())
    manifest_name = pack.get("manifest")
    if not manifest_name:
        continue
    manifest_path = root / manifest_name
    if not manifest_path.exists():
        print(f"::error file={pack_path}::references missing manifest '{manifest_name}'")
        fail = True
        continue
    manifest = json.loads(manifest_path.read_text())
    families = {
        str(build.get("chipFamily", "")).upper()
        for build in manifest.get("builds", [])
        if build.get("chipFamily")
    }
    tag = str(pack.get("tag", "ESP32")).upper()
    if not families:
        print(f"::error file={manifest_path}::manifest has no chipFamily")
        fail = True
    elif tag not in families:
        found = ", ".join(sorted(families))
        print(f"::error file={pack_path}::tag '{tag}' does not match {manifest_name} chipFamily ({found})")
        fail = True
    else:
        print(f"✓ {pack_path} tag {tag} matches {manifest_name}")

if fail:
    sys.exit(1)
print("✅ every pack tag matches its manifest chip family")
PY
