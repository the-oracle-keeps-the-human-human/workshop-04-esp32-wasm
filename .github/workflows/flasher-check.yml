name: flasher-check

# Root-cause guard for the web flasher: a PR that adds/edits a flasher manifest
# must point its FIRST (smallest-offset) part at a real ESP image — first byte
# 0xE9. This is what stops a "brick on flash" bin (0xff/erased at offset 0)
# from ever reaching the live Pages site again. Also fails on missing parts.

on:
  pull_request:
    paths: ["docs/**"]
  workflow_dispatch: {}

jobs:
  validate-flasher-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every manifest part must exist and executable images must be valid ESP images
        run: |
          fail=0
          shopt -s nullglob
          for m in docs/manifest-*.json; do
            mapfile -t parts < <(python3 - "$m" <<'PY'
          import json,sys
          d=json.load(open(sys.argv[1]))
          for b in d.get("builds",[]):
              for p in b.get("parts",[]):
                  print(p.get("path",""), p.get("offset",0))
          PY
          )
            for line in "${parts[@]}"; do
              bin="${line% *}"; off="${line##* }"
              f="docs/$bin"
              if [ ! -f "$f" ]; then echo "::error file=$m::references missing part '$bin'"; fail=1; continue; fi
              magic=$(head -c1 "$f" | xxd -p)
              case "$bin" in
                *partition*|*boot_app0*|*storage*)
                  echo "✓ $m → $bin (data/partition magic 0x$magic)"
                  ;;
                *)
                  if [ "$magic" != "e9" ]; then
                    echo "::error file=$m::offset-$off part '$bin' starts 0x$magic — executable ESP image parts must be 0xE9"
                    fail=1
                  else
                    echo "✓ $m → $bin (0xE9)"
                  fi
                  ;;
              esac
            done
          done
          if [ "$fail" -ne 0 ]; then echo "❌ one or more flasher manifests would ship a missing or bad image"; exit 1; fi
          echo "✅ all flasher manifest parts exist and executable images are 0xE9"
      - name: Pack manifests must exist
        run: |
          fail=0
          shopt -s nullglob
          for p in docs/packs/*.json; do
            manifest=$(python3 - "$p" <<'PY'
          import json,sys
          d=json.load(open(sys.argv[1]))
          print(d.get("manifest",""))
          PY
          )
            [ -z "$manifest" ] && { echo "✓ $p has no manifest yet (pending artifact)"; continue; }
            if [ ! -f "docs/$manifest" ]; then
              echo "::error file=$p::references missing manifest '$manifest'"
              fail=1
            else
              echo "✓ $p → $manifest"
            fi
          done
          if [ "$fail" -ne 0 ]; then echo "❌ one or more pack manifests are missing"; exit 1; fi
          echo "✅ all referenced pack manifests exist"
