name: flasher-check

# Root-cause guard for the web flasher. A PR that edits docs must keep packs,
# previews, and ESP Web Tools manifests internally consistent before Pages can
# publish them.

on:
  pull_request:
    paths: ["docs/**"]
  workflow_dispatch: {}

jobs:
  validate-flasher-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate flasher packs, previews, and manifests
        run: python3 tools/validate-flasher-docs.py
