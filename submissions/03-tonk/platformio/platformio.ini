; Tonk sprout — wasm-on-ESP32 via wasm3 · PlatformIO (Arduino framework)
; Loads the zero-import tonk.wasm and calls its pure exports on the chip.
;
;   pio run                 # build → must end [SUCCESS]
;   pio run -t upload       # flash
;   pio device monitor -b 115200   # → add(2,3)=5 · tonk_grow(10)=35 · selftest=6291556
[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
lib_deps      = wasm3/Wasm3@^0.5.0
; d_m3HasWASI=0 — our module has ZERO imports, no WASI layer needed.
build_flags   = -Dd_m3HasWASI=0 -Dd_m3HasTracer=0
