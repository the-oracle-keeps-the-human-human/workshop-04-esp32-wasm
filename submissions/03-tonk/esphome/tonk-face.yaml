# Tonk face — the device's display (LVGL) showing LIVE wasm output.
# The tonk_wasm component runs tonk.wasm under wasm3 ON the chip at boot; the LVGL
# label below reads the numbers it actually computed (not hard-coded text).
#
#   esphome compile tonk-face.yaml      # must end "Successfully compiled"
esphome:
  name: tonk-face
  friendly_name: Tonk Face (live wasm)
  on_boot:
    priority: -100
    then:
      - lvgl.label.update:
          id: tonk_live
          text: !lambda "return esphome::tonk_wasm::TonkWasm::line;"

esp32:
  board: esp32dev
  framework:
    type: arduino   # so wasm3 (an Arduino lib) links cleanly

external_components:
  - source:
      type: local
      path: components
    components: [tonk_wasm]

# runs tonk.wasm under wasm3 at boot, fills TonkWasm::line with live results
tonk_wasm:

logger:

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

display:
  - platform: ili9xxx
    model: ili9341
    cs_pin: GPIO5
    dc_pin: GPIO2
    reset_pin: GPIO4
    invert_colors: false
    auto_clear_enabled: false
    update_interval: never

lvgl:
  pages:
    - id: tonk_page
      widgets:
        - obj:
            align: CENTER
            width: 280
            height: 170
            bg_color: 0x0B0F1A
            border_color: 0x39D353
            border_width: 2
            widgets:
              - label:
                  align: TOP_MID
                  y: 10
                  text: "Tonk sprout - wasm on ESP32"
                  text_color: 0x39D353
              - label:
                  id: tonk_live
                  align: CENTER
                  text: "running wasm3..."
                  text_color: 0xE7ECF5
              - label:
                  align: BOTTOM_MID
                  y: -8
                  text: "live, computed on-chip by wasm3"
                  text_color: 0x8A93A6

# re-read the live result a few times in case wasm finishes just after boot
interval:
  - interval: 2s
    then:
      - lvgl.label.update:
          id: tonk_live
          text: !lambda "return esphome::tonk_wasm::TonkWasm::line;"
