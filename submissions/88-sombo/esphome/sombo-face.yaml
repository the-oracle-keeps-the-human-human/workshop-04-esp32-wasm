esphome:
  name: sombo-face
  friendly_name: "Sombo WASM Face"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: INFO

spi:
  clk_pin: 18
  mosi_pin: 23

display:
  - platform: ili9xxx
    model: ili9341
    cs_pin: 5
    dc_pin: 16
    reset_pin: 17
    dimensions:
      width: 320
      height: 240
    invert_colors: false
    auto_clear_enabled: false

font:
  - file: "gfonts://Roboto Mono"
    id: mono_16
    size: 16
  - file: "gfonts://Roboto Mono"
    id: mono_24
    size: 24
  - file: "gfonts://Roboto Mono"
    id: mono_12
    size: 12

lvgl:
  pages:
    - id: main_page
      widgets:
        - label:
            text: "🤖 No.88 Sombo"
            align: TOP_MID
            y: 10
            text_font: mono_24
            text_color: 0x07E7FF
        - label:
            text: "WASM on ESP32"
            align: TOP_MID
            y: 45
            text_font: mono_16
            text_color: 0xE5A830
        - label:
            text: "gifcore.wasm — 416 bytes"
            align: CENTER
            y: -20
            text_font: mono_16
            text_color: 0xFFFFFF
        - label:
            text: "zero imports · wasm3 runtime"
            align: CENTER
            y: 10
            text_font: mono_12
            text_color: 0x888888
        - label:
            text: "add(2,3) = 5 ✓"
            align: CENTER
            y: 45
            text_font: mono_16
            text_color: 0x39D353
        - label:
            text: "gif_parse: 96×100 ✓"
            align: CENTER
            y: 70
            text_font: mono_16
            text_color: 0x39D353
        - label:
            text: "many bodies, one soul"
            align: BOTTOM_MID
            y: -10
            text_font: mono_12
            text_color: 0x555555
