; Singhasingha — wasm runs ON the ESP32 via wasm3  🦁
; "ฟ้าร้องก่อนฝน — สิงห์เฝ้าโค้ดก่อน production"
;
;   uvx --from platformio platformio run     # compile firmware (must end [SUCCESS])
;   uvx --from platformio platformio run -t upload   # flash (needs board)
;
; The embedded singha.wasm (zero imports) is parsed + executed by wasm3 on-chip.
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = wasm3/Wasm3@^0.5.0
build_flags = -Dd_m3HasWASI=0 -Dd_m3HasTracer=0
