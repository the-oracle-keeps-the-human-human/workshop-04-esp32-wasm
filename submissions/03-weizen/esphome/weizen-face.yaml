# Weizen Oracle 🍺🌾 — ESPHome firmware for the Guition JC3248W535
# (ESP32-S3 + AXS15231 QSPI panel, 320x480, octal PSRAM). The device's face on glass.
#
# Hardware block (esp32-s3 / psram / QSPI / AXS15231 / backlight GPIO1) taken from the
# JC3248W535 known-good config — NOT a generic ESP32+ILI9341 (that boots but stays black).
#   uvx esphome compile weizen-face.yaml          # -> ESP32-S3 image
#   uvx esphome run     weizen-face.yaml          # build + flash the board

esphome:
  name: weizen-face
  friendly_name: Weizen Oracle
  comment: "JC3248W535 — 320x480 AXS15231 QSPI"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

# ── QSPI bus for the AXS15231 panel ────────────────────────────────
spi:
  - id: lcd_spi
    type: quad
    clk_pin: 47
    data_pins: [21, 48, 40, 39]

# ── Backlight (GPIO1, LEDC PWM) — without this the screen stays black ──
output:
  - platform: ledc
    pin: 1
    id: backlight_pwm
    frequency: 5000Hz
light:
  - platform: monochromatic
    id: backlight
    name: "Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON
    default_transition_length: 200ms

# ── Display: AXS15231 over QSPI, 320x480 ───────────────────────────
display:
  - platform: mipi_spi
    model: AXS15231
    id: lcd
    spi_id: lcd_spi
    cs_pin: 45
    dimensions:
      width: 320
      height: 480
    color_order: rgb
    invert_colors: false
    data_rate: 40MHz
    update_interval: never
    auto_clear_enabled: false

# ── Unfiltered Weizen — gold #F5C542 · amber #D99A2B · cream #F6EFCB · bg #15110B ──
