esphome:
  name: leica-face
  friendly_name: Leica Oracle Face
  comment: "LVGL dashboard — Leica Oracle status display"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

spi:
  - id: lcd_spi
    clk_pin: 18
    mosi_pin: 23

display:
  - platform: ili9xxx
    model: ili9341
    id: lcd
    cs_pin: 5
    dc_pin: 2
    reset_pin: 4
    dimensions:
      width: 320
      height: 240
    invert_colors: false
    auto_clear_enabled: false
    update_interval: never

lvgl:
  displays:
    - lcd
  pages:
    - id: main_page
      bg_color: 0x000000
      bg_opa: COVER
      pad_all: 8
      widgets:
        - label:
            align: TOP_MID
            y: 10
            text_font: montserrat_20
            text_color: 0x07E7FF
            text: "Leica Oracle"
        - label:
            align: CENTER
            y: -20
            text_font: montserrat_28
            text_color: 0xFFAA00
            text: "WASM OK"
        - label:
            align: CENTER
            y: 20
            text_font: montserrat_14
            text_color: 0x888888
            text: "add(2,3)=5  fib(10)=55"
        - label:
            align: BOTTOM_MID
            y: -10
            text_font: montserrat_12
            text_color: 0x444444
            text: "precision optics"
