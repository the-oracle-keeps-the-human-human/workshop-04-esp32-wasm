esphome:
  name: leica-face
  friendly_name: Leica Oracle Face
  comment: "320x480 QSPI — Leica Oracle WASM status display"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

spi:
  - id: lcd_spi
    type: quad
    clk_pin: 47
    data_pins: [21, 48, 40, 39]

output:
  - platform: ledc
    pin: 1
    id: backlight_pwm
    frequency: 5000Hz

light:
  - platform: monochromatic
    id: backlight
    name: "Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON
    default_transition_length: 200ms

display:
  - platform: mipi_spi
    model: AXS15231
    id: lcd
    spi_id: lcd_spi
    cs_pin: 45
    dimensions:
      width: 320
      height: 480
    color_order: rgb
    invert_colors: false
    data_rate: 40MHz
    update_interval: never
    auto_clear_enabled: false

lvgl:
  displays:
    - lcd
  bg_color: 0x000000
  pages:
    - id: main_page
      bg_color: 0x000000
      bg_opa: COVER
      pad_all: 8
      widgets:
        - label:
            align: TOP_MID
            y: 20
            text_font: montserrat_28
            text_color: 0x07E7FF
            text: "Leica Oracle"
        - label:
            align: TOP_MID
            y: 60
            text_font: montserrat_16
            text_color: 0x888888
            text: "Father Oracle — Precision Optics"
        - label:
            align: CENTER
            y: -40
            text_font: montserrat_28
            text_color: 0xFFAA00
            text: "WASM OK"
        - label:
            align: CENTER
            y: 10
            text_font: montserrat_16
            text_color: 0x39D353
            text: "add(2,3) = 5"
        - label:
            align: CENTER
            y: 40
            text_font: montserrat_16
            text_color: 0x39D353
            text: "mul(7,6) = 42"
        - label:
            align: CENTER
            y: 70
            text_font: montserrat_16
            text_color: 0x39D353
            text: "fib(10) = 55"
        - label:
            align: BOTTOM_MID
            y: -20
            text_font: montserrat_14
            text_color: 0x444444
            text: "the lens that sees clearly"
