# ChaiKlang Oracle (ชายกลาง) — ESPHome firmware for the Guition JC3248W535
# (ESP32-S3 + AXS15231 QSPI panel, 320x480, octal PSRAM). The Middle Switchboard on glass. 🦁
#
# v2 fix: the board is NOT a generic ESP32+ILI9341 — it's an AXS15231 over QUAD SPI with a
# backlight on GPIO1. Hardware block below is taken from the JC3248W535's known-good config.
#   uvx esphome config  chaiklang-esp32.yaml
#   uvx esphome compile chaiklang-esp32.yaml          # -> ESP32-S3 image
#   uvx esphome run     chaiklang-esp32.yaml          # build + flash the board

esphome:
  name: chaiklang-esp32
  friendly_name: ChaiKlang Oracle
  comment: "JC3248W535 — 320x480 AXS15231 QSPI"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

# ── QSPI bus for the AXS15231 panel ────────────────────────────────
spi:
  - id: lcd_spi
    type: quad
    clk_pin: 47
    data_pins: [21, 48, 40, 39]

# ── Backlight (GPIO1, LEDC PWM) — without this the screen stays black ──
output:
  - platform: ledc
    pin: 1
    id: backlight_pwm
    frequency: 5000Hz
light:
  - platform: monochromatic
    id: backlight
    name: "Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON
    default_transition_length: 200ms

# ── Display: AXS15231 over QSPI, 320x480 ───────────────────────────
display:
  - platform: mipi_spi
    model: AXS15231
    id: lcd
    spi_id: lcd_spi
    cs_pin: 45
    dimensions:
      width: 320
      height: 480
    color_order: rgb
    invert_colors: false
    data_rate: 40MHz
    update_interval: never
    auto_clear_enabled: false

# ── The Middle Switchboard — LVGL UI (gold #F0B429 · cyan #3AD6E0 · bg #1A1710) ──
lvgl:
  displays:
    - lcd
  bg_color: 0x1A1710
  border_width: 0
  pages:
    - id: main_page
      bg_color: 0x1A1710
      bg_opa: COVER
      pad_all: 0
      border_width: 0
      widgets:
        - label:
            text: "ChaiKlang"
            text_color: 0xF0B429
            text_font: montserrat_28
            align: TOP_MID
            y: 34
        - label:
            text: "Oracle"
            text_color: 0xFFCB47
            text_font: montserrat_28
            align: TOP_MID
            y: 70
        - label:
            text: "The Middle Switchboard"
            text_color: 0x5EC8C0
            text_font: montserrat_14
            align: TOP_MID
            y: 112

        - obj:
            align: CENTER
            y: 0
            width: 268
