# ChaiKlang Oracle (ชายกลาง) — ESPHome firmware for the Guition JC3248W535
# (ESP32-S3 + AXS15231 QSPI panel, 320x480, octal PSRAM). The lion, animated on glass. 🦁
#
# v3: the device now shows the ANIMATED ChaiKlang lion (LVGL animimg, 8 frames) — matching
# the web flasher's live preview. Same hardware block as v2 (AXS15231 QSPI + backlight).
#   uvx esphome compile chaiklang-esp32.yaml          # -> ESP32-S3 image

esphome:
  name: chaiklang-esp32
  friendly_name: ChaiKlang Oracle
  comment: "JC3248W535 — 320x480 AXS15231 QSPI · animated lion"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

spi:
  - id: lcd_spi
    type: quad
    clk_pin: 47
    data_pins: [21, 48, 40, 39]

output:
  - platform: ledc
    pin: 1
    id: backlight_pwm
    frequency: 5000Hz
light:
  - platform: monochromatic
    id: backlight
    output: backlight_pwm
    restore_mode: ALWAYS_ON
    default_transition_length: 200ms

display:
  - platform: mipi_spi
    model: AXS15231
    id: lcd
    spi_id: lcd_spi
    cs_pin: 45
    dimensions:
      width: 320
      height: 480
    color_order: rgb
    invert_colors: false
    data_rate: 40MHz
    update_interval: never
    auto_clear_enabled: false

# ── ChaiKlang lion frames (extracted from the same gif the flasher previews) ──
image:
  - { id: lion0, file: lion/f0.png, type: RGB565 }
  - { id: lion1, file: lion/f1.png, type: RGB565 }
  - { id: lion2, file: lion/f2.png, type: RGB565 }
  - { id: lion3, file: lion/f3.png, type: RGB565 }
  - { id: lion4, file: lion/f4.png, type: RGB565 }
  - { id: lion5, file: lion/f5.png, type: RGB565 }
  - { id: lion6, file: lion/f6.png, type: RGB565 }
  - { id: lion7, file: lion/f7.png, type: RGB565 }

lvgl:
  displays:
    - lcd
  bg_color: 0x1A1710
  border_width: 0
  pages:
    - id: main_page
      bg_color: 0x1A1710
      bg_opa: COVER
      pad_all: 0
      border_width: 0
      widgets:
        - label:
            text: "ChaiKlang Oracle"
            text_color: 0xF0B429
            text_font: montserrat_24
            align: TOP_MID
            y: 40
        # the animated lion — same frames as the flasher's live preview
        - animimg:
            id: lion_anim
            src: [lion0, lion1, lion2, lion3, lion4, lion5, lion6, lion7]
            duration: 1200ms
            repeat_count: forever
            auto_start: true
            align: CENTER
            y: -6
        - label:
            text: "The Middle Switchboard"
            text_color: 0x5EC8C0
            text_font: montserrat_16
            align: BOTTOM_MID
            y: -46
        - label:
            text: "esp32-s3 . axs15231 . lvgl"
            text_color: 0x6B6458
            text_font: montserrat_14
            align: BOTTOM_MID
            y: -16
