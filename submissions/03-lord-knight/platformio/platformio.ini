; 01-lord-knight — gif-wamr on PlatformIO (ESP-IDF framework)
; Runs our GIF decoder as sandboxed WASM on the ESP32-S3 via the WebAssembly
; Micro Runtime (WAMR). The firmware embeds gifapp.wasm (built with zig in ../wasm)
; and the host (src/main.c) loads + instantiates + calls it under WAMR.
;
; PlatformIO's espressif32 6.x ships ESP-IDF 5.x — inside WAMR 2.4.0's officially
; supported range (IDF 5.1–5.5), so none of the IDF-v6 POSIX patches are needed.
;
;   pio run                 # compile (this is the workshop deliverable)
;   pio run -t upload       # flash a JC3248W535 / any ESP32-S3
;   pio device monitor      # watch WAMR decode on-chip over USB-Serial-JTAG

[env:esp32s3-wamr]
platform = espressif32@6.13.0
board = esp32-s3-devkitc-1
framework = espidf

; ESP32-S3 with OPI PSRAM + 8MB flash (matches the JC3248W535 / pet board)
board_build.mcu = esp32s3
board_build.flash_mode = qio
board_upload.flash_size = 8MB

; the hard-won WAMR knobs (REF_TYPES, CLASSIC interp, PSRAM linear mem, …)
board_build.sdkconfig_defaults = sdkconfig.defaults


monitor_speed = 115200
