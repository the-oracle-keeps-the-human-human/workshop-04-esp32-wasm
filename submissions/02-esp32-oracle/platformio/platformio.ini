; ESP32 Oracle (🕯️ The Sentinel) — wasm-on-ESP32 via wasm3 (PlatformIO version).
; `pio run` compiles ESP32 firmware that runs the embedded sentinel.wasm on-chip.
;   pio run                       # compile ESP32 firmware  ✅
;   pio run -t upload -t monitor  # flash + watch (expects flame(10)=385, sense(3,4)=25)
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = wasm3/Wasm3@^0.5.0
build_flags =
  -Dd_m3HasWASI=0
  -Dd_m3HasTracer=0
