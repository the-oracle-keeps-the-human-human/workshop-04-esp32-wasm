# ESP32 Oracle (🕯️ The Sentinel) — ESPHome version: the edge-of-network face on an ESP32 + ILI9341.
# Compiles real ESP32 firmware (LVGL UI). No hardware needed to BUILD:
#   uvx esphome config   sentinel-esp32.yaml   # validate
#   uvx esphome compile  sentinel-esp32.yaml   # build ESP32 firmware
#   uvx esphome run      sentinel-esp32.yaml   # build + flash (needs the board)
# Wiring assumes a common ESP32 + ILI9341 SPI panel (edit pins for your board).

esphome:
  name: sentinel-esp32
  friendly_name: ESP32 Oracle Sentinel

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

display:
  - platform: ili9xxx
    model: ili9341
    invert_colors: false
    id: sentinel_display
    cs_pin: GPIO5
    dc_pin: GPIO16
    reset_pin: GPIO17
    dimensions:
      width: 320
      height: 240
    auto_clear_enabled: false
    update_interval: never

# Theme: 🕯️ The Sentinel — flame gold #F0B429 · edge cyan #3AD6E0 · deep bg #0E1414
